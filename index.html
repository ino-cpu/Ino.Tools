<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>Ino.Tools · AI Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ===== ROOT ===== */
        :root {
            --bg-body: #0a0c1a;
            --bg-glass: rgba(6, 10, 22, 0.7);
            --bg-input: rgba(0, 20, 40, 0.4);
            --border-color: rgba(0, 255, 255, 0.15);
            --text-primary: #eef2f6;
            --text-secondary: #a8b5d9;
            --text-muted: #6a7a9e;
            --accent: #6c5ce7;
            --accent-glow: 0 0 30px rgba(108, 92, 231, 0.25);
            --accent-dim: rgba(108, 92, 231, 0.12);
            --shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.6);
            --radius: 1.8rem;
            --transition: 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            --logo-size: 64px;
        }
        [data-theme="light"] {
            --bg-body: #f0edff;
            --bg-glass: rgba(255, 255, 255, 0.8);
            --bg-input: rgba(0, 0, 0, 0.04);
            --border-color: rgba(124, 77, 255, 0.15);
            --text-primary: #1a1035;
            --text-secondary: #4a3f6b;
            --text-muted: #7a6f99;
            --accent: #7c4dff;
            --accent-glow: 0 0 30px rgba(124, 77, 255, 0.12);
            --shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.08);
        }

        /* ===== RESET ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(ellipse at 20% 30%, var(--bg-body), #020308);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 1.5rem 1.2rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            transition: background 0.3s, color 0.3s;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(108, 92, 231, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(108, 92, 231, 0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }
        .app {
            position: relative;
            z-index: 2;
            max-width: 960px;
            width: 100%;
        }

        /* ===== GLASS PANEL ===== */
        .glass-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow), 0 0 20px rgba(108, 92, 231, 0.04);
            padding: 1.8rem 1.8rem 1.5rem;
            transition: all var(--transition);
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px 20px;
            border-bottom: 1.5px solid var(--border-color);
            padding-bottom: 0.8rem;
            margin-bottom: 1.8rem;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .logo-img {
            height: var(--logo-size);
            width: auto;
            border-radius: 12px;
            display: block;
            object-fit: contain;
            filter: drop-shadow(0 0 16px rgba(108, 92, 231, 0.2));
        }
        .logo-text {
            font-size: 1.7rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            white-space: nowrap;
        }
        .logo-text span {
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent);
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .social-link {
            color: var(--text-secondary);
            font-size: 16px;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            text-decoration: none;
        }
        .social-link:hover {
            color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-dim);
            transform: translateY(-2px);
        }
        .theme-toggle {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 4px 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all var(--transition);
            line-height: 1.6;
            white-space: nowrap;
        }
        .theme-toggle:hover {
            border-color: var(--accent);
            color: var(--text-primary);
            box-shadow: 0 0 20px var(--accent-dim);
        }
        .theme-toggle i { font-size: 14px; color: var(--accent); }
        .theme-toggle .icon-sun { display: none; }
        .theme-toggle .icon-moon { display: inline; }
        [data-theme="light"] .theme-toggle .icon-sun { display: inline; }
        [data-theme="light"] .theme-toggle .icon-moon { display: none; }

        /* ===== TABS ===== */
        .tabs-wrapper {
            position: relative;
            margin: 0 0 18px 0;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .tabs-scroll {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            gap: 4px;
            padding: 4px 4px;
            background: var(--bg-input);
            border-radius: 60px;
            border: 1px solid var(--border-color);
            flex: 1;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
        }
        .tabs-scroll::-webkit-scrollbar { display: none; }
        .tab-btn {
            flex: 0 0 auto;
            padding: 6px 14px;
            border: none;
            background: transparent;
            border-radius: 40px;
            font-weight: 600;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            scroll-snap-align: start;
        }
        .tab-btn i { font-size: 13px; color: var(--text-muted); transition: color var(--transition); }
        .tab-btn:hover { color: var(--text-primary); background: rgba(108, 92, 231, 0.08); }
        .tab-btn.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 24px rgba(108, 92, 231, 0.2);
        }
        .tab-btn.active i { color: #fff; }

        .tab-scroll-btn {
            flex: 0 0 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            backdrop-filter: blur(8px);
            z-index: 2;
            font-size: 12px;
        }
        .tab-scroll-btn:hover { border-color: var(--accent); color: var(--text-primary); box-shadow: 0 0 16px var(--accent-dim); }
        .tab-scroll-btn.hidden { opacity: 0; pointer-events: none; visibility: hidden; }

        .tabs-dots {
            display: flex;
            justify-content: center;
            gap: 5px;
            padding: 4px 0 0;
        }
        .tabs-dots .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--border-color);
            transition: all var(--transition);
            cursor: pointer;
        }
        .tabs-dots .dot.active {
            background: var(--accent);
            width: 16px;
            border-radius: 4px;
            box-shadow: 0 0 12px var(--accent);
        }

        /* ===== PANELS ===== */
        .panel { display: none; animation: fadeSlide 0.25s ease; }
        .panel.active { display: block; }
        @keyframes fadeSlide { 0% { opacity: 0; transform: translateY(6px); } 100% { opacity: 1; transform: translateY(0); } }

        /* ===== CARDS =====
