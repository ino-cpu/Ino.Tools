<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ino Digital — Premium Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #080b12;
            --bg2: #0e1520;
            --card: #131c2b;
            --input: #0c1320;
            --border: #1e2a3f;
            --border-hover: #2e4060;
            --text: #edf2f7;
            --text2: #8899b0;
            --muted: #4a5a72;
            --accent: #5b7cfa;
            --gradient: linear-gradient(135deg, #5b7cfa, #a855f7);
            --radius: 16px;
            --radius-sm: 10px;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px 20px 40px;
            min-height: 100vh;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .logo-icon {
            width: 44px;
            height: 44px;
            background: var(--gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            box-shadow: 0 0 30px rgba(91, 124, 250, 0.3);
        }
        .logo-text h1 {
            font-size: 26px;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-text span {
            font-size: 13px;
            color: var(--text2);
            display: block;
            margin-top: -2px;
        }
        .header-status {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.4);
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.6;
                transform: scale(0.85);
            }
        }
        .header-status .label {
            color: var(--text2);
        }
        .header-status .value {
            color: var(--text);
            font-weight: 500;
        }

        /* BANNER */
        .banner-wrapper {
            margin-top: 28px;
            border-radius: var(--radius);
            overflow: hidden;
            background: #0a0f1a;
            border: 1px solid var(--border);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
            position: relative;
        }
        .banner-wrapper video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 5;
            object-fit: cover;
            filter: brightness(0.85) saturate(1.1);
        }
        .banner-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(8, 11, 18, 0.7) 0%, transparent 60%, rgba(8, 11, 18, 0.3) 100%);
            pointer-events: none;
        }

        /* SECTION */
        .section-head {
            margin: 40px 0 12px;
        }
        .section-head h2 {
            font-size: 26px;
            font-weight: 700;
        }
        .section-head p {
            color: var(--text2);
            font-size: 15px;
            margin-top: 4px;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
            margin-top: 16px;
        }

        /* CARD */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--gradient);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .card:hover {
            border-color: var(--border-hover);
            transform: translateY(-6px);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
        }
        .card:hover::before {
            opacity: 1;
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }
        .card-header .icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(91, 124, 250, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .card-header h3 {
            font-size: 17px;
            font-weight: 600;
        }
        .card-header .badge {
            background: rgba(91, 124, 250, 0.15);
            color: var(--accent);
            font-size: 10px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            margin-left: auto;
        }
        .card-desc {
            color: var(--text2);
            font-size: 14px;
            margin: 4px 0 16px;
            padding-left: 52px;
        }

        /* INPUT */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .input-row input[type="text"] {
            flex: 1;
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 11px 14px;
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border 0.2s, box-shadow 0.2s;
            min-width: 0;
        }
        .input-row input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(91, 124, 250, 0.15);
        }
        .input-row input[type="text"]::placeholder {
            color: var(--muted);
        }
        .input-row input[type="file"] {
            display: none;
        }
        .btn-upload {
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 11px 16px;
            color: var(--text2);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .btn-upload:hover {
            background: var(--border);
            color: var(--text);
            border-color: var(--border-hover);
        }
        .upload-status {
            font-size: 12px;
            color: var(--text2);
            min-height: 20px;
            padding-left: 4px;
            transition: all 0.2s;
        }
        .upload-status.success {
            color: #22c55e;
        }
        .upload-status.error {
            color: #ef4444;
        }
        .upload-status.loading {
            color: var(--accent);
        }

        /* BUTTON EXECUTE */
        .btn-execute {
            background: var(--gradient);
            border: none;
            border-radius: var(--radius-sm);
            padding: 12px;
            font-weight: 600;
            font-size: 14px;
            font-family: inherit;
            color: #fff;
            cursor: pointer;
            transition: all 0.25s;
            width: 100%;
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-execute:hover {
            transform: scale(1.01);
            box-shadow: 0 4px 24px rgba(91, 124, 250, 0.35);
        }
        .btn-execute:active {
            transform: scale(0.97);
        }

        /* RESULT */
        .result-box {
            margin-top: 14px;
            background: var(--input);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            font-size: 13px;
            max-height: 220px;
            overflow: auto;
            border: 1px solid var(--border);
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--text2);
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.5;
            min-height: 56px;
            position: relative;
        }
        .result-box .placeholder {
            color: var(--muted);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
        }
        .loader-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent);
        }
        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2.5px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* FOOTER */
        footer {
            margin-top: 56px;
            padding: 24px 0 10px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        footer p {
            color: var(--muted);
            font-size: 13px;
        }
        footer a {
            color: var(--text2);
            text-decoration: none;
            transition: color 0.2s;
            font-size: 13px;
        }
        footer a:hover {
            color: var(--accent);
        }
        .footer-links {
            display: flex;
            gap: 20px;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: stretch;
            }
            .grid {
                grid-template-columns: 1fr;
            }
            .banner-wrapper video {
                aspect-ratio: 16 / 7;
            }
            .card-desc {
                padding-left: 0;
            }
            footer {
                flex-direction: column;
                text-align: center;
            }
            .footer-links {
                justify-content: center;
            }
        }
        @media (max-width: 480px) {
            .input-row {
                flex-wrap: wrap;
            }
            .btn-upload {
                width: 100%;
                justify-content: center;
            }
            .card-header .badge {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- HEADER -->
        <header>
            <a href="#" class="logo">
                <div class="logo-icon">ID</div>
                <div class="logo-text">
                    <h1>INO DIGITAL</h1>
                    <span>Premium API Tools</span>
                </div>
            </a>
            <div class="header-status">
                <span class="status-dot"></span>
                <span class="label">Server</span>
                <span class="value">Online</span>
                <span style="color:var(--muted);margin:0 4px;">•</span>
                <span class="label">v3.0</span>
            </div>
        </header>

        <!-- BANNER -->
        <div class="banner-wrapper">
            <video autoplay loop muted playsinline>
                <source src="https://files.catbox.moe/164r52.mp4" type="video/mp4" />
            </video>
            <div class="banner-overlay"></div>
        </div>

        <!-- SECTION -->
        <div class="section-head">
            <h2>⚡ Pilih Fitur</h2>
            <p>Klik kartu, isi parameter, lalu Execute. Upload gambar langsung dari galeri.</p>
        </div>

        <!-- GRID -->
        <div class="grid" id="cardContainer"></div>

        <!-- FOOTER -->
        <footer>
            <p>&copy; 2026 <strong style="color:var(--text);">Ino Digital</strong> — Dibuat dengan ❤️</p>
            <div class="footer-links">
                <a href="#">Docs</a>
                <a href="#">GitHub</a>
                <a href="#">Support</a>
            </div>
        </footer>

    </div>

    <script>
        // ============================================================
        //  DATA FITUR
        // ============================================================
        const features = [{
            id: 'igc',
            title: 'iPhone Group Chat',
            desc: 'Generate fake iMessage group chat screenshot.',
            icon: '💬',
            params: [
                { key: 'profile', label: 'Profile URL', placeholder: 'https://...', isImage: true },
                { key: 'nama', label: 'Nama Grup', placeholder: 'Ino Digital | PUB', isImage: false },
                { key: 'peserta', label: 'Jumlah Peserta', placeholder: '148', isImage: false }
            ],
            endpoint: '/api/maker/igc'
        }, {
            id: 'hdimage',
            title: 'HD Image Upscale',
            desc: 'Upscale gambar hingga 4x. Upload langsung dari galeri!',
            icon: '🖼️',
            params: [
                { key: 'url', label: 'Image URL', placeholder: 'Pilih gambar dari galeri', isImage: true, autoUpload: true },
                { key: 'scale', label: 'Scale (2 / 3 / 4)', placeholder: '4', isImage: false }
            ],
            endpoint: '/api/tools/hdimage'
        }, {
            id: 'fakeff',
            title: 'Fake FF Profile',
            desc: 'Buat profil Free Fire palsu dengan nama custom.',
            icon: '🎮',
            params: [
                { key: 'name', label: 'Nama FF', placeholder: 'halo1234', isImage: false }
            ],
            endpoint: '/api/maker/fakeff'
        }, {
            id: 'allinone',
            title: 'All-in-One Download',
            desc: 'Download berbagai resource dalam satu paket instan.',
            icon: '📦',
            params: [],
            endpoint: '/api/download/allinone'
        }];

        // ============================================================
        //  RENDER CARDS
        // ============================================================
        const container = document.getElementById('cardContainer');

        features.forEach((f, idx) => {
            const card = document.createElement('div');
            card.className = 'card';

            let inputsHtml = '';
            f.params.forEach((p, pIdx) => {
                const inputId = `${f.id}_${p.key}`;
                const fileId = `${f.id}_file_${pIdx}`;

                let rowHtml = `
                    <div class="input-row">
                        <input type="text" id="${inputId}" placeholder="${p.placeholder}" />
                `;

                if (p.isImage) {
                    rowHtml += `
                        <input type="file" id="${fileId}" accept="image/*" />
                        <button class="btn-upload" onclick="triggerUpload('${fileId}', '${inputId}')">
                            📎 Upload
                        </button>
                    `;
                }

                rowHtml += `</div>
                    <div class="upload-status" id="status_${inputId}"></div>
                `;
                inputsHtml += rowHtml;
            });

            card.innerHTML = `
                <div class="card-header">
                    <div class="icon">${f.icon}</div>
                    <h3>${f.title}</h3>
                    <span class="badge">${f.id}</span>
                </div>
                <p class="card-desc">${f.desc}</p>
                <div class="input-group">
                    ${inputsHtml}
                    <button class="btn-execute" onclick="execute('${f.id}')">
                        ▶ Execute ✨
                    </button>
                </div>
                <div class="result-box" id="result_${f.id}">
                    <span class="placeholder">⬅️ Hasil akan muncul di sini</span>
                </div>
            `;
            container.appendChild(card);
        });

        // ============================================================
        //  UPLOAD GAMBAR (via API Nanzz) — FIXED
        // ============================================================
        async function triggerUpload(fileInputId, textInputId) {
            const fileInput = document.getElementById(fileInputId);
            const statusEl = document.getElementById(`status_${textInputId}`);

            fileInput.click();

            fileInput.onchange = async function() {
                if (this.files.length === 0) return;

                const file = this.files[0];
                statusEl.textContent = `⏳ Mengupload ${file.name}...`;
                statusEl.className = 'upload-status loading';

                const formData = new FormData();
                formData.append('file', file);

                try {
                    const response = await fetch('https://api-nanzz.my.id/docs/api/uploader/uguu.php', {
                        method: 'POST',
                        body: formData
                    });

                    const text = await response.text();
                    let result;
                    try {
                        result = JSON.parse(text);
                    } catch (e) {
                        statusEl.textContent = `❌ Gagal: Response bukan JSON (${text.substring(0, 50)})`;
                        statusEl.className = 'upload-status error';
                        this.value = '';
                        return;
                    }

                    // Cari URL dari berbagai struktur
                    let url = null;
                    if (result.status === true) {
                        if (result.result && result.result.url) url = result.result.url;
                        else if (result.data && result.data.url) url = result.data.url;
                        else if (result.url) url = result.url;
                        else if (result.link) url = result.link;
                        else if (result.file && result.file.url) url = result.file.url;
                    }

                    if (url) {
                        document.getElementById(textInputId).value = url;
                        statusEl.textContent = `✅ Berhasil! Link otomatis masuk.`;
                        statusEl.className = 'upload-status success';
                    } else {
                        statusEl.textContent = `❌ Gagal: ${result.message || 'Format response tidak dikenali'}`;
                        statusEl.className = 'upload-status error';
                    }
                } catch (err) {
                    statusEl.textContent = `❌ Error: ${err.message}`;
                    statusEl.className = 'upload-status error';
                }

                this.value = '';
            };
        }

        // ============================================================
        //  EXECUTE — dengan auto-upload + error handling total
        // ============================================================
        async function execute(featureId) {
            const feature = features.find(f => f.id === featureId);
            if (!feature) return;

            const resultBox = document.getElementById(`result_${featureId}`);
            resultBox.innerHTML = `<div class="loader-wrap"><span class="loader"></span> Memproses...</div>`;

            // 1. Auto-upload untuk HD Image jika URL kosong
            const imageParam = feature.params.find(p => p.isImage && p.autoUpload === true);
            if (imageParam) {
                const inputEl = document.getElementById(`${featureId}_${imageParam.key}`);
                if (!inputEl.value.trim()) {
                    const card = resultBox.closest('.card');
                    const uploadBtn = card.querySelector('.btn-upload');
                    if (uploadBtn) {
                        uploadBtn.click();
                        // Tunggu sampai URL terisi (max 30 detik)
                        await new Promise(resolve => {
                            let elapsed = 0;
                            const interval = setInterval(() => {
                                elapsed += 300;
                                if (inputEl.value.trim() || elapsed > 30000) {
                                    clearInterval(interval);
                                    resolve();
                                }
                            }, 300);
                        });
                    }
                }
            }

            // 2. Kumpulkan parameter
            let params = {};
            feature.params.forEach(p => {
                const el = document.getElementById(`${featureId}_${p.key}`);
                if (el) {
                    const val = el.value.trim();
                    params[p.key] = val || p.placeholder;
                }
            });

            // 3. Bangun URL
            const query = new URLSearchParams(params).toString();
            const fullUrl = query ? `${feature.endpoint}?${query}` : feature.endpoint;

            // 4. Panggil proxy
            try {
                const proxyUrl = `proxy.php?url=${encodeURIComponent(fullUrl)}`;
                const response = await fetch(proxyUrl);

                // Cek HTTP status
                if (!response.ok) {
                    const text = await response.text();
                    resultBox.innerHTML = `❌ HTTP ${response.status}: ${text.substring(0, 200)}`;
                    return;
                }

                const text = await response.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    resultBox.innerHTML = `❌ Response bukan JSON.\nRaw: ${text.substring(0, 300)}`;
                    return;
                }

                // Cek error dari proxy
                if (data.error) {
                    resultBox.innerHTML = `❌ Error: ${data.error}\n${data.detail || data.raw || ''}`;
                } else {
                    resultBox.innerHTML = JSON.stringify(data, null, 2);
                }
            } catch (err) {
                resultBox.innerHTML = `❌ Error jaringan: ${err.message}`;
            }
        }
    </script>

</body>
</html>
