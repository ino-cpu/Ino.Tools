<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ino Digital — Premium Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        /* ===== RESET & ROOT ===== */
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg: #0b0f17;
            --card: #141c2b;
            --input: #0e1624;
            --border: #1f2a3f;
            --border-hover: #324a6a;
            --text: #eef2f8;
            --text2: #98a9c7;
            --muted: #4c5f7a;
            --accent: #5b7cfa;
            --gradient: linear-gradient(135deg, #5b7cfa, #a855f7);
            --radius: 14px;
            --shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        body.light {
            --bg: #f0f4f9;
            --card: #ffffff;
            --input: #f2f6fc;
            --border: #d0d9e8;
            --border-hover: #b0bed8;
            --text: #0f1a2e;
            --text2: #33435c;
            --muted: #6a7f9a;
            --shadow: 0 10px 40px rgba(0,0,0,0.08);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px 16px 30px;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        .container { max-width: 1100px; margin: 0 auto; }

        /* ===== HEADER ===== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .logo-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            overflow: hidden;
            background: var(--gradient);
            flex-shrink: 0;
        }
        .logo-icon img { width:100%; height:100%; object-fit:cover; }
        .logo-text h1 {
            font-size: 24px;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-text span { font-size: 12px; color: var(--text2); display:block; margin-top:-2px; }
        .header-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text2);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 1.8s infinite;
            box-shadow: 0 0 10px rgba(34,197,94,0.3);
        }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.85)} }
        .theme-toggle {
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 38px;
            height: 38px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text);
        }
        .theme-toggle:hover { background: var(--border); }

        /* ===== SOCIAL BAR ===== */
        .social-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 18px;
            padding: 10px 0 6px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .social-bar a {
            color: var(--text2);
            text-decoration: none;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
        .social-bar a:hover { color: var(--accent); }
        .social-bar .icon { font-size: 16px; }

        /* ===== BANNER VIDEO ===== */
        .banner {
            margin-top: 10px;
            border-radius: var(--radius);
            overflow: hidden;
            background: #0a0e16;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            position: relative;
        }
        .banner video {
            width: 100%;
            display: block;
            aspect-ratio: 16/5;
            object-fit: cover;
            filter: brightness(0.8) saturate(1.1);
        }
        .banner-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.6) 0%, transparent 70%, rgba(0,0,0,0.2) 100%);
            pointer-events: none;
        }
        .banner-hint {
            position: absolute;
            bottom: 14px;
            right: 18px;
            background: rgba(0,0,0,0.7);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #fff;
            backdrop-filter: blur(4px);
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.5s;
        }
        .banner-hint.hidden { opacity: 0; }

        /* ===== SECTION ===== */
        .section-head { margin: 32px 0 12px; }
        .section-head h2 { font-size: 24px; font-weight: 700; }
        .section-head p { color: var(--text2); font-size: 14px; margin-top: 4px; }

        /* ===== GRID ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 22px;
            margin-top: 12px;
        }

        /* ===== CARD ===== */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 22px 20px 20px;
            border: 1px solid var(--border);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--gradient);
            opacity: 0;
            transition: 0.3s;
        }
        .card:hover {
            border-color: var(--border-hover);
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }
        .card:hover::before { opacity: 1; }
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 4px;
        }
        .card-header .icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: rgba(91,124,250,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .card-header h3 { font-size: 16px; font-weight: 600; }
        .card-header .badge {
            background: rgba(91,124,250,0.15);
            color: var(--accent);
            font-size: 9px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 12px;
            text-transform: uppercase;
            margin-left: auto;
        }
        .card-desc {
            color: var(--text2);
            font-size: 13px;
            margin: 4px 0 14px;
            padding-left: 50px;
        }

        /* ===== INPUT ===== */
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .field label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text2);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .field label .hint {
            font-weight: 400;
            color: var(--muted);
            font-size: 11px;
        }
        .field input[type="text"] {
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
            width: 100%;
        }
        .field input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(91,124,250,0.12);
        }
        .field input[type="text"]::placeholder { color: var(--muted); }
        .field input[type="file"] { display: none; }

        /* ===== FILE PICKER ===== */
        .file-picker {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-pick {
            background: var(--input);
            border: 1px dashed var(--border);
            border-radius: 8px;
            padding: 10px 16px;
            color: var(--text2);
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            justify-content: center;
        }
        .btn-pick:hover {
            background: var(--border);
            border-color: var(--border-hover);
            color: var(--text);
        }
        .file-status {
            font-size: 12px;
            color: var(--text2);
            min-height: 18px;
        }
        .file-status.success { color: #22c55e; }
        .file-status.error { color: #ef4444; }
        .file-status.loading { color: var(--accent); }

        /* ===== BUTTON EXECUTE ===== */
        .btn-execute {
            background: var(--gradient);
            border: none;
            border-radius: 8px;
            padding: 11px;
            font-weight: 600;
            font-size: 14px;
            font-family: inherit;
            color: #fff;
            cursor: pointer;
            transition: 0.25s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 4px;
        }
        .btn-execute:hover {
            transform: scale(1.01);
            box-shadow: 0 4px 20px rgba(91,124,250,0.35);
        }
        .btn-execute:active { transform: scale(0.97); }

        /* ===== RESULT BOX ===== */
        .result-box {
            margin-top: 12px;
            background: var(--input);
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 12px;
            max-height: 200px;
            overflow: auto;
            border: 1px solid transparent;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.5;
            min-height: 44px;
            transition: 0.2s;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
        }
        .result-box .placeholder {
            color: var(--muted);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .result-box .placeholder::before {
            content: '↳';
            opacity: 0.6;
        }
        .loader-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent);
        }
        .loader {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== FOOTER ===== */
        footer {
            margin-top: 48px;
            padding: 20px 0 8px;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--muted);
            font-size: 13px;
        }
        footer strong { color: var(--text); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            header { flex-direction: column; align-items: stretch; }
            .header-right { justify-content: space-between; }
            .social-bar { justify-content: center; }
            .grid { grid-template-columns: 1fr; }
            .banner video { aspect-ratio: 16/7; }
            .card-desc { padding-left: 0; }
        }
        @media (max-width: 480px) {
            .file-picker { flex-direction: column; align-items: stretch; }
            .card-header .badge { display: none; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <header>
        <a href="#" class="logo">
            <div class="logo-icon">
                <img src="https://files.catbox.moe/8zgs2t.png" alt="Ino Digital" />
            </div>
            <div class="logo-text">
                <h1>INO DIGITAL</h1>
                <span>Premium API Tools</span>
            </div>
        </a>
        <div class="header-right">
            <div class="status-badge">
                <span class="status-dot"></span>
                <span>Online</span>
            </div>
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
        </div>
    </header>

    <!-- SOCIAL BAR -->
    <div class="social-bar">
        <a href="mailto:support@inodigital.com" target="_blank">
            <span class="icon">📧</span> Support
        </a>
        <a href="https://tiktok.com/@inodigital" target="_blank">
            <span class="icon">🎵</span> TikTok
        </a>
        <a href="https://whatsapp.com/channel/0029Va..." target="_blank">
            <span class="icon">💬</span> WhatsApp
        </a>
    </div>

    <!-- BANNER VIDEO -->
    <div class="banner">
        <video id="bannerVideo" autoplay loop playsinline muted>
            <source src="https://files.catbox.moe/164r52.mp4" type="video/mp4" />
        </video>
        <div class="banner-overlay"></div>
        <div class="banner-hint" id="bannerHint">🔊 Klik di mana saja untuk suara</div>
    </div>

    <!-- SECTION -->
    <div class="section-head">
        <h2>⚡ Pilih Fitur</h2>
        <p>Pilih gambar dari galeri, isi data, lalu Execute.</p>
    </div>

    <!-- GRID -->
    <div class="grid" id="cardContainer"></div>

    <!-- FOOTER -->
    <footer>
        &copy; 2026 <strong>Ino Digital</strong> — Dibuat dengan ❤️
    </footer>

</div>

<script>
// ================================================================
// THEME TOGGLE
// ================================================================
function toggleTheme() {
    const body = document.body;
    const toggle = document.getElementById('themeToggle');
    body.classList.toggle('light');
    if (body.classList.contains('light')) {
        toggle.textContent = '☀️';
        localStorage.setItem('theme', 'light');
    } else {
        toggle.textContent = '🌙';
        localStorage.setItem('theme', 'dark');
    }
}
(function() {
    const saved = localStorage.getItem('theme');
    const toggle = document.getElementById('themeToggle');
    if (saved === 'light') {
        document.body.classList.add('light');
        toggle.textContent = '☀️';
    }
})();

// ================================================================
// VIDEO — aktifkan suara dengan sekali klik di mana saja
// ================================================================
const video = document.getElementById('bannerVideo');
const hint = document.getElementById('bannerHint');

function enableAudio() {
    if (video) {
        video.muted = false;
        video.play().catch(() => {});
        hint.classList.add('hidden');
        document.removeEventListener('click', enableAudio);
        document.removeEventListener('touchstart', enableAudio);
    }
}
document.addEventListener('click', enableAudio);
document.addEventListener('touchstart', enableAudio);
video.play().catch(() => {});

// ================================================================
// DATA FITUR — 4 fitur (allinone tetap ada)
// ================================================================
const features = [
    {
        id: 'igc',
        title: 'iPhone Group Chat',
        desc: 'Buat screenshot chat iMessage palsu.',
        icon: '💬',
        params: [
            { key: 'profile', label: 'Foto Profil Grup', hint: 'pilih gambar', isImage: true },
            { key: 'nama', label: 'Nama Grup', hint: 'contoh: Ino Digital | PUB' },
            { key: 'peserta', label: 'Jumlah Peserta', hint: 'contoh: 148' }
        ],
        endpoint: '/api/maker/igc'
    },
    {
        id: 'hdimage',
        title: 'HD Image Upscale',
        desc: 'Upscale gambar hingga 4x lebih besar.',
        icon: '🖼️',
        params: [
            { key: 'url', label: 'Gambar', hint: 'pilih gambar', isImage: true, autoUpload: true },
            { key: 'scale', label: 'Skala', hint: '2, 3, atau 4' }
        ],
        endpoint: '/api/tools/hdimage'
    },
    {
        id: 'fakeff',
        title: 'Fake FF Profile',
        desc: 'Buat profil Free Fire palsu.',
        icon: '🎮',
        params: [
            { key: 'name', label: 'Nama FF', hint: 'contoh: halo1234' }
        ],
        endpoint: '/api/maker/fakeff'
    },
    {
        id: 'allinone',
        title: 'All-in-One Download',
        desc: 'Download file dari URL yang kamu masukkan.',
        icon: '📦',
        params: [
            { key: 'url', label: 'Link Download', hint: 'contoh: https://example.com/file.mp4' }
        ],
        endpoint: '/api/download/allinone'
    }
];

// ================================================================
// RENDER CARDS
// ================================================================
const container = document.getElementById('cardContainer');

features.forEach((f) => {
    const card = document.createElement('div');
    card.className = 'card';

    let inputsHtml = '';
    f.params.forEach((p, idx) => {
        const inputId = `${f.id}_${p.key}`;
        if (p.isImage) {
            const fileId = `${f.id}_file_${idx}`;
            inputsHtml += `
                <div class="field">
                    <label>${p.label} <span class="hint">(${p.hint})</span></label>
                    <div class="file-picker">
                        <button class="btn-pick" onclick="triggerUpload('${fileId}','${inputId}')">
                            📁 Pilih File
                        </button>
                        <span class="file-status" id="status_${inputId}">Belum ada file</span>
                    </div>
                    <input type="hidden" id="${inputId}" value="" />
                    <input type="file" id="${fileId}" accept="image/*" style="display:none;" />
                </div>
            `;
        } else {
            inputsHtml += `
                <div class="field">
                    <label>${p.label} <span class="hint">(${p.hint})</span></label>
                    <input type="text" id="${inputId}" placeholder="${p.hint}" />
                </div>
            `;
        }
    });

    card.innerHTML = `
        <div class="card-header">
            <div class="icon">${f.icon}</div>
            <h3>${f.title}</h3>
            <span class="badge">${f.id}</span>
        </div>
        <p class="card-desc">${f.desc}</p>
        <div class="input-group">
            ${inputsHtml}
            <button class="btn-execute" onclick="execute('${f.id}')">▶ Execute ✨</button>
        </div>
        <div class="result-box" id="result_${f.id}">
            <span class="placeholder">Hasil akan muncul di sini</span>
        </div>
    `;
    container.appendChild(card);
});

// ================================================================
// UPLOAD GAMBAR
// ================================================================
async function triggerUpload(fileInputId, textInputId) {
    const fileInput = document.getElementById(fileInputId);
    const statusEl = document.getElementById(`status_${textInputId}`);
    fileInput.click();

    fileInput.onchange = async function() {
        if (this.files.length === 0) return;
        const file = this.files[0];
        statusEl.textContent = `⏳ Mengupload...`;
        statusEl.className = 'file-status loading';

        const formData = new FormData();
        formData.append('file', file);

        try {
            const res = await fetch('https://api-nanzz.my.id/docs/api/uploader/uguu.php', {
                method: 'POST',
                body: formData
            });
            const text = await res.text();
            let result;
            try { result = JSON.parse(text); } catch (e) {
                statusEl.textContent = '❌ Gagal: response bukan JSON';
                statusEl.className = 'file-status error';
                this.value = '';
                return;
            }
            let url = null;
            if (result.status === true) {
                if (result.result?.url) url = result.result.url;
                else if (result.data?.url) url = result.data.url;
                else if (result.url) url = result.url;
                else if (result.link) url = result.link;
            }
            if (url) {
                document.getElementById(textInputId).value = url;
                statusEl.textContent = `✅ ${file.name} siap`;
                statusEl.className = 'file-status success';
            } else {
                statusEl.textContent = `❌ Gagal: ${result.message || 'format tidak dikenali'}`;
                statusEl.className = 'file-status error';
            }
        } catch (err) {
            statusEl.textContent = `❌ Error: ${err.message}`;
            statusEl.className = 'file-status error';
        }
        this.value = '';
    };
}

// ================================================================
// EXECUTE
// ================================================================
async function execute(featureId) {
    const feature = features.find(f => f.id === featureId);
    if (!feature) return;

    const resultBox = document.getElementById(`result_${featureId}`);
    resultBox.innerHTML = `<div class="loader-wrap"><span class="loader"></span> Memproses...</div>`;

    // Auto-upload untuk HD Image
    const imageParam = feature.params.find(p => p.isImage && p.autoUpload === true);
    if (imageParam) {
        const inputEl = document.getElementById(`${featureId}_${imageParam.key}`);
        if (!inputEl.value.trim()) {
            const card = resultBox.closest('.card');
            const pickBtn = card.querySelector('.btn-pick');
            if (pickBtn) {
                pickBtn.click();
                await new Promise(resolve => {
                    let elapsed = 0;
                    const interval = setInterval(() => {
                        elapsed += 300;
                        if (inputEl.value.trim() || elapsed > 25000) {
                            clearInterval(interval);
                            resolve();
                        }
                    }, 300);
                });
            }
        }
    }

    // Kumpulkan parameter
    let params = {};
    feature.params.forEach(p => {
        const el = document.getElementById(`${featureId}_${p.key}`);
        if (el) {
            const val = el.value.trim();
            if (val) params[p.key] = val;
        }
    });

    const query = new URLSearchParams(params).toString();
    const fullUrl = query ? `${feature.endpoint}?${query}` : feature.endpoint;

    try {
        const proxyUrl = `proxy.php?url=${encodeURIComponent(fullUrl)}`;
        const response = await fetch(proxyUrl);

        if (!response.ok) {
            const text = await response.text();
            // Cek apakah ini error 403 dengan pesan HTML
            if (response.status === 403) {
                resultBox.innerHTML = `❌ Akses ditolak (403). Pastikan URL yang dimasukkan benar.`;
            } else {
                resultBox.innerHTML = `❌ HTTP ${response.status}: ${text.substring(0, 150)}`;
            }
            return;
        }

        const text = await response.text();
        let data;
        try {
            data = JSON.parse(text);
        } catch (e) {
            resultBox.innerHTML = `❌ Response bukan JSON.\n${text.substring(0, 200)}`;
            return;
        }

        if (data.error) {
            resultBox.innerHTML = `❌ ${data.error}`;
            if (data.detail) resultBox.innerHTML += `\n${data.detail}`;
        } else {
            resultBox.innerHTML = JSON.stringify(data, null, 2);
        }
    } catch (err) {
        resultBox.innerHTML = `❌ Error jaringan: ${err.message}`;
    }
}
</script>
</body>
</html>
