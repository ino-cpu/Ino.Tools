<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ino Digital — Premium Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        /* ============================================================
           RESET & VARIABLES
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #080b12;
            --bg2: #0e1520;
            --card: #131c2b;
            --input: #0c1320;
            --border: #1e2a3f;
            --border-hover: #2e4060;
            --text: #edf2f7;
            --text2: #8899b0;
            --muted: #4a5a72;
            --accent: #5b7cfa;
            --gradient: linear-gradient(135deg, #5b7cfa, #a855f7);
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
        }

        /* Light mode */
        body.light {
            --bg: #f1f5f9;
            --bg2: #e2e8f0;
            --card: #ffffff;
            --input: #f8fafc;
            --border: #cbd5e1;
            --border-hover: #94a3b8;
            --text: #0f172a;
            --text2: #334155;
            --muted: #64748b;
            --shadow: 0 12px 48px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px 20px 40px;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* ============================================================
           HEADER
           ============================================================ */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .logo-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            overflow: hidden;
            flex-shrink: 0;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .logo-text h1 {
            font-size: 26px;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-text span {
            font-size: 13px;
            color: var(--text2);
            display: block;
            margin-top: -2px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header-status {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.4);
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.6;
                transform: scale(0.85);
            }
        }
        .header-status .label {
            color: var(--text2);
        }
        .header-status .value {
            color: var(--text);
            font-weight: 500;
        }

        /* ============================================================
           THEME TOGGLE
           ============================================================ */
        .theme-toggle {
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
        }
        .theme-toggle:hover {
            background: var(--border);
            border-color: var(--border-hover);
        }

        /* ============================================================
           SOCIAL MEDIA BAR (atas)
           ============================================================ */
        .social-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
            padding: 10px 0 6px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .social-bar a {
            color: var(--text2);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }
        .social-bar a:hover {
            color: var(--accent);
        }
        .social-bar .social-icon {
            font-size: 18px;
        }

        /* ============================================================
           BANNER VIDEO
           ============================================================ */
        .banner-wrapper {
            margin-top: 8px;
            border-radius: var(--radius);
            overflow: hidden;
            background: #0a0f1a;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            position: relative;
        }
        .banner-wrapper video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 5;
            object-fit: cover;
            filter: brightness(0.85) saturate(1.1);
            cursor: pointer;
        }
        .banner-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(8, 11, 18, 0.7) 0%, transparent 60%, rgba(8, 11, 18, 0.3) 100%);
            pointer-events: none;
        }
        .banner-hint {
            position: absolute;
            bottom: 16px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #fff;
            pointer-events: none;
            backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 0.5s;
        }
        .banner-hint.show {
            opacity: 1;
        }

        /* ============================================================
           SECTION
           ============================================================ */
        .section-head {
            margin: 40px 0 12px;
        }
        .section-head h2 {
            font-size: 26px;
            font-weight: 700;
        }
        .section-head p {
            color: var(--text2);
            font-size: 15px;
            margin-top: 4px;
        }

        /* ============================================================
           GRID & CARDS
           ============================================================ */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
            margin-top: 16px;
        }
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--gradient);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .card:hover {
            border-color: var(--border-hover);
            transform: translateY(-6px);
            box-shadow: var(--shadow);
        }
        .card:hover::before {
            opacity: 1;
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }
        .card-header .icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(91, 124, 250, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .card-header h3 {
            font-size: 17px;
            font-weight: 600;
        }
        .card-header .badge {
            background: rgba(91, 124, 250, 0.15);
            color: var(--accent);
            font-size: 10px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            margin-left: auto;
        }
        .card-desc {
            color: var(--text2);
            font-size: 14px;
            margin: 4px 0 16px;
            padding-left: 52px;
        }

        /* ============================================================
           INPUT
           ============================================================ */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .input-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .input-field label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text2);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .input-field label .hint {
            font-weight: 400;
            color: var(--muted);
            font-size: 12px;
        }
        .input-field input[type="text"] {
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 11px 14px;
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        .input-field input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(91, 124, 250, 0.15);
        }
        .input-field input[type="text"]::placeholder {
            color: var(--muted);
        }
        .input-field input[type="file"] {
            display: none;
        }

        /* ============================================================
           FILE PICKER
           ============================================================ */
        .file-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn-pick-file {
            background: var(--input);
            border: 1px dashed var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 20px;
            color: var(--text2);
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            justify-content: center;
        }
        .btn-pick-file:hover {
            background: var(--border);
            border-color: var(--border-hover);
            color: var(--text);
        }
        .btn-pick-file .icon-big {
            font-size: 22px;
        }
        .file-status {
            font-size: 13px;
            color: var(--text2);
            min-height: 20px;
        }
        .file-status.success {
            color: #22c55e;
        }
        .file-status.error {
            color: #ef4444;
        }
        .file-status.loading {
            color: var(--accent);
        }

        /* ============================================================
           BUTTON EXECUTE
           ============================================================ */
        .btn-execute {
            background: var(--gradient);
            border: none;
            border-radius: var(--radius-sm);
            padding: 12px;
            font-weight: 600;
            font-size: 14px;
            font-family: inherit;
            color: #fff;
            cursor: pointer;
            transition: all 0.25s;
            width: 100%;
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-execute:hover {
            transform: scale(1.01);
            box-shadow: 0 4px 24px rgba(91, 124, 250, 0.35);
        }
        .btn-execute:active {
            transform: scale(0.97);
        }

        /* ============================================================
           RESULT BOX
           ============================================================ */
        .result-box {
            margin-top: 14px;
            background: var(--input);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            font-size: 13px;
            max-height: 220px;
            overflow: auto;
            border: 1px solid var(--border);
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--text2);
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.5;
            min-height: 56px;
            position: relative;
        }
        .result-box .placeholder {
            color: var(--muted);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
        }
        .loader-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent);
        }
        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2.5px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ============================================================
           FOOTER
           ============================================================ */
        footer {
            margin-top: 56px;
            padding: 24px 0 10px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        footer p {
            color: var(--muted);
            font-size: 13px;
        }
        footer a {
            color: var(--text2);
            text-decoration: none;
            transition: color 0.2s;
            font-size: 13px;
        }
        footer a:hover {
            color: var(--accent);
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: stretch;
            }
            .header-right {
                justify-content: space-between;
            }
            .social-bar {
                justify-content: center;
            }
            .grid {
                grid-template-columns: 1fr;
            }
            .banner-wrapper video {
                aspect-ratio: 16 / 7;
            }
            .card-desc {
                padding-left: 0;
            }
            footer {
                flex-direction: column;
                text-align: center;
            }
        }
        @media (max-width: 480px) {
            .file-picker-wrapper {
                flex-direction: column;
                align-items: stretch;
            }
            .card-header .badge {
                display: none;
            }
            .header-status .label {
                display: none;
            }
            .social-bar {
                gap: 12px;
            }
            .social-bar a {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ===== HEADER ===== -->
        <header>
            <a href="#" class="logo">
                <div class="logo-icon">
                    <img src="https://files.catbox.moe/8zgs2t.png" alt="Ino Digital" />
                </div>
                <div class="logo-text">
                    <h1>INO DIGITAL</h1>
                    <span>Premium API Tools</span>
                </div>
            </a>
            <div class="header-right">
                <div class="header-status">
                    <span class="status-dot"></span>
                    <span class="label">Server</span>
                    <span class="value">Online</span>
                    <span style="color:var(--muted);margin:0 4px;">•</span>
                    <span class="label">v3.0</span>
                </div>
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
            </div>
        </header>

        <!-- ===== SOCIAL MEDIA BAR (atas) ===== -->
        <div class="social-bar">
            <a href="mailto:support@inodigital.com" target="_blank">
                <span class="social-icon">📧</span> Support
            </a>
            <a href="https://tiktok.com/@inodigital" target="_blank">
                <span class="social-icon">🎵</span> TikTok
            </a>
            <a href="https://whatsapp.com/channel/0029Va..." target="_blank">
                <span class="social-icon">💬</span> WhatsApp
            </a>
        </div>

        <!-- ===== BANNER VIDEO ===== -->
        <div class="banner-wrapper">
            <video id="bannerVideo" autoplay loop playsinline muted>
                <source src="https://files.catbox.moe/164r52.mp4" type="video/mp4" />
                Browser Anda tidak mendukung video.
            </video>
            <div class="banner-overlay"></div>
            <div class="banner-hint show" id="bannerHint">🔊 Klik di mana saja untuk suara</div>
        </div>

        <!-- ===== SECTION ===== -->
        <div class="section-head">
            <h2>⚡ Pilih Fitur</h2>
            <p>Pilih gambar dari galeri, isi data lainnya, lalu Execute.</p>
        </div>

        <!-- ===== GRID ===== -->
        <div class="grid" id="cardContainer"></div>

        <!-- ===== FOOTER ===== -->
        <footer>
            <p>&copy; 2026 <strong style="color:var(--text);">Ino Digital</strong> — Dibuat dengan ❤️</p>
        </footer>

    </div>

    <script>
        // ================================================================
        // THEME TOGGLE
        // ================================================================
        function toggleTheme() {
            const body = document.body;
            const toggle = document.getElementById('themeToggle');
            body.classList.toggle('light');
            if (body.classList.contains('light')) {
                toggle.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            } else {
                toggle.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            }
        }

        (function loadTheme() {
            const saved = localStorage.getItem('theme');
            const toggle = document.getElementById('themeToggle');
            if (saved === 'light') {
                document.body.classList.add('light');
                toggle.textContent = '☀️';
            } else {
                toggle.textContent = '🌙';
            }
        })();

        // ================================================================
        // VIDEO — Aktifkan suara dengan sekali klik di mana saja
        // ================================================================
        const video = document.getElementById('bannerVideo');
        const hint = document.getElementById('bannerHint');

        function enableAudio() {
            if (video) {
                video.muted = false;
                video.play().catch(() => {});
                hint.classList.remove('show');
                // Hapus listener setelah pertama kali
                document.removeEventListener('click', enableAudio);
                document.removeEventListener('touchstart', enableAudio);
            }
        }

        // Pasang listener untuk klik/tap di seluruh halaman
        document.addEventListener('click', enableAudio);
        document.addEventListener('touchstart', enableAudio);

        // Coba putar otomatis (mungkin tanpa suara, tapi tetap jalan)
        video.play().catch(() => {});

        // ================================================================
        // DATA FITUR
        // ================================================================
        const features = [{
            id: 'igc',
            title: 'iPhone Group Chat',
            desc: 'Generate fake iMessage group chat screenshot.',
            icon: '💬',
            params: [
                { key: 'profile', label: 'Foto Profil Grup', hint: 'Pilih gambar dari galeri', isImage: true },
                { key: 'nama', label: 'Nama Grup', hint: 'contoh: Ino Digital | PUB', isImage: false },
                { key: 'peserta', label: 'Jumlah Peserta', hint: 'contoh: 148', isImage: false }
            ],
            endpoint: '/api/maker/igc'
        }, {
            id: 'hdimage',
            title: 'HD Image Upscale',
            desc: 'Upscale gambar hingga 4x lebih besar.',
            icon: '🖼️',
            params: [
                { key: 'url', label: 'Gambar', hint: 'Pilih gambar dari galeri', isImage: true, autoUpload: true },
                { key: 'scale', label: 'Skala', hint: 'pilih 2, 3, atau 4', isImage: false }
            ],
            endpoint: '/api/tools/hdimage'
        }, {
            id: 'fakeff',
            title: 'Fake FF Profile',
            desc: 'Buat profil Free Fire palsu dengan nama custom.',
            icon: '🎮',
            params: [
                { key: 'name', label: 'Nama FF', hint: 'contoh: halo1234', isImage: false }
            ],
            endpoint: '/api/maker/fakeff'
        }, {
            id: 'allinone',
            title: 'All-in-One Download',
            desc: 'Download file dari URL yang kamu masukkan.',
            icon: '📦',
            params: [
                { key: 'url', label: 'Link Download', hint: 'contoh: https://example.com/file.mp4', isImage: false }
            ],
            endpoint: '/api/download/allinone'
        }];

        // ================================================================
        // RENDER CARDS
        // ================================================================
        const container = document.getElementById('cardContainer');

        features.forEach((f, idx) => {
            const card = document.createElement('div');
            card.className = 'card';

            let inputsHtml = '';
            let fileInputId = null;
            let textInputIdForImage = null;

            f.params.forEach((p, pIdx) => {
                const inputId = `${f.id}_${p.key}`;
                const fieldId = `field_${inputId}`;

                if (p.isImage) {
                    fileInputId = `${f.id}_file_${pIdx}`;
                    textInputIdForImage = inputId;

                    inputsHtml += `
                        <div class="input-field" id="${fieldId}">
                            <label>${p.label} <span class="hint">(${p.hint})</span></label>
                            <div class="file-picker-wrapper">
                                <button class="btn-pick-file" onclick="triggerUpload('${fileInputId}', '${textInputIdForImage}')">
                                    <span class="icon-big">📁</span> Pilih File
                                </button>
                                <span class="file-status" id="status_${inputId}">Belum ada file</span>
                            </div>
                            <input type="hidden" id="${textInputIdForImage}" value="" />
                            <input type="file" id="${fileInputId}" accept="image/*" style="display:none;" />
                        </div>
                    `;
                } else {
                    inputsHtml += `
                        <div class="input-field" id="${fieldId}">
                            <label>${p.label} <span class="hint">(${p.hint})</span></label>
                            <input type="text" id="${inputId}" placeholder="${p.hint}" />
                        </div>
                    `;
                }
            });

            card.innerHTML = `
                <div class="card-header">
                    <div class="icon">${f.icon}</div>
                    <h3>${f.title}</h3>
                    <span class="badge">${f.id}</span>
                </div>
                <p class="card-desc">${f.desc}</p>
                <div class="input-group">
                    ${inputsHtml}
                    <button class="btn-execute" onclick="execute('${f.id}')">
                        ▶ Execute ✨
                    </button>
                </div>
                <div class="result-box" id="result_${f.id}">
                    <span class="placeholder">⬅️ Hasil akan muncul di sini</span>
                </div>
            `;
            container.appendChild(card);
        });

        // ================================================================
        // UPLOAD GAMBAR (via API Nanzz)
        // ================================================================
        async function triggerUpload(fileInputId, textInputId) {
            const fileInput = document.getElementById(fileInputId);
            const statusEl = document.getElementById(`status_${textInputId}`);

            fileInput.click();

            fileInput.onchange = async function() {
                if (this.files.length === 0) return;

                const file = this.files[0];
                statusEl.textContent = `⏳ Mengupload ${file.name}...`;
                statusEl.className = 'file-status loading';

                const formData = new FormData();
                formData.append('file', file);

                try {
                    const response = await fetch('https://api-nanzz.my.id/docs/api/uploader/uguu.php', {
                        method: 'POST',
                        body: formData
                    });

                    const text = await response.text();
                    let result;
                    try {
                        result = JSON.parse(text);
                    } catch (e) {
                        statusEl.textContent = `❌ Gagal: response bukan JSON`;
                        statusEl.className = 'file-status error';
                        this.value = '';
                        return;
                    }

                    let url = null;
                    if (result.status === true) {
                        if (result.result && result.result.url) url = result.result.url;
                        else if (result.data && result.data.url) url = result.data.url;
                        else if (result.url) url = result.url;
                        else if (result.link) url = result.link;
                        else if (result.file && result.file.url) url = result.file.url;
                    }

                    if (url) {
                        document.getElementById(textInputId).value = url;
                        statusEl.textContent = `✅ ${file.name} siap digunakan`;
                        statusEl.className = 'file-status success';
                    } else {
                        statusEl.textContent = `❌ Gagal: ${result.message || 'format tidak dikenali'}`;
                        statusEl.className = 'file-status error';
                    }
                } catch (err) {
                    statusEl.textContent = `❌ Error: ${err.message}`;
                    statusEl.className = 'file-status error';
                }

                this.value = '';
            };
        }

        // ================================================================
        // EXECUTE
        // ================================================================
        async function execute(featureId) {
            const feature = features.find(f => f.id === featureId);
            if (!feature) return;

            const resultBox = document.getElementById(`result_${featureId}`);
            resultBox.innerHTML = `<div class="loader-wrap"><span class="loader"></span> Memproses...</div>`;

            // Auto-upload untuk HD Image
            const imageParam = feature.params.find(p => p.isImage && p.autoUpload === true);
            if (imageParam) {
                const inputEl = document.getElementById(`${featureId}_${imageParam.key}`);
                if (!inputEl.value.trim()) {
                    const card = resultBox.closest('.card');
                    const pickBtn = card.querySelector('.btn-pick-file');
                    if (pickBtn) {
                        pickBtn.click();
                        await new Promise(resolve => {
                            let elapsed = 0;
                            const interval = setInterval(() => {
                                elapsed += 300;
                                if (inputEl.value.trim() || elapsed > 30000) {
                                    clearInterval(interval);
                                    resolve();
                                }
                            }, 300);
                        });
                    }
                }
            }

            // Kumpulkan parameter
            let params = {};
            feature.params.forEach(p => {
                const el = document.getElementById(`${featureId}_${p.key}`);
                if (el) {
                    const val = el.value.trim();
                    if (val) params[p.key] = val;
                }
            });

            // Bangun URL
            const query = new URLSearchParams(params).toString();
            const fullUrl = query ? `${feature.endpoint}?${query}` : feature.endpoint;

            try {
                const proxyUrl = `proxy.php?url=${encodeURIComponent(fullUrl)}`;
                const response = await fetch(proxyUrl);

                if (!response.ok) {
                    const text = await response.text();
                    resultBox.innerHTML = `❌ HTTP ${response.status}: ${text.substring(0, 300)}`;
                    return;
                }

                const text = await response.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    resultBox.innerHTML = `❌ Response bukan JSON.\nRaw: ${text.substring(0, 300)}`;
                    return;
                }

                if (data.error) {
                    resultBox.innerHTML = `❌ Error: ${data.error}\n${data.detail || data.raw || ''}`;
                } else {
                    resultBox.innerHTML = JSON.stringify(data, null, 2);
                }
            } catch (err) {
                resultBox.innerHTML = `❌ Error jaringan: ${err.message}`;
            }
        }
    </script>
